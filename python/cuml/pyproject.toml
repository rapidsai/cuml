[build-system]
build-backend = "rapids_build_backend.build"
requires = [
    "rapids-build-backend>=0.4.0,<0.5.0",
    "scikit-build-core[pyproject]>=0.11.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.pydistcheck]
select = [
    "distro-too-large-compressed",
]

# PyPI hard limit is 1GiB, but try to keep this as small as possible
max_allowed_size_compressed = '15Mi'

[tool.pytest.ini_options]
addopts = "--tb=native --import-mode=append"

markers = [
  "unit: Quickest tests focused on accuracy and correctness",
  "quality: More intense tests than unit with increased runtimes",
  "stress: Longest running tests focused on stressing hardware compute resources",
  "mg: Multi-GPU tests",
  "memleak: Test that checks for memory leaks",
  "ucx: Run _only_ Dask UCXX tests",
]

testpaths = [
  "cuml/tests",
  "cuml/tests/dask",
  "cuml/tests/experimental",
  "cuml/tests/explainer",
  "cuml/tests/stemmer_tests",
]

filterwarnings = [
  "error::FutureWarning",
  "error::DeprecationWarning",
  "error:::cudf",
  "ignore:[^.]*ABCs[^.]*:DeprecationWarning:patsy[.*]",
  "ignore:(.*)alias(.*):DeprecationWarning:hdbscan[.*]",
  # From sklearn
  "ignore:A column-vector y was passed:sklearn.exceptions.DataConversionWarning",
  # From dask-glm
  "ignore:pkg_resources is deprecated as an API:DeprecationWarning",
  "ignore:Deprecated call to `pkg_resources.declare_namespace:DeprecationWarning",
  "ignore:`rcond` parameter will change to the default:FutureWarning",
  "ignore:Dask configuration key 'fuse_ave_width':FutureWarning",
  # From dask/distributed
  "ignore:Dask annotations .* detected:UserWarning",
  "ignore:Sending large graph of size:UserWarning",
  # From hdbscan
  "ignore:Conversion of an array with ndim > 0:DeprecationWarning",
  # From umap-learn
  "ignore:Tensorflow not installed.*:ImportWarning:umap",
  # From sklearn estimator checks
  "ignore:Estimator .* does not inherit from.*:UserWarning",
  # TargetEncoder combination mode deprecation (will change to 2D output in 26.04)
  "ignore:TargetEncoder currently returns 1D output:FutureWarning",
  # From numba - GPU under-utilization warnings in tests with small data
  "ignore::numba.core.errors.NumbaPerformanceWarning",
  # numba-cuda makes use of deprecated cuda.core.experimental apis
  "ignore:The cuda.core.experimental namespace is deprecated:DeprecationWarning",
  # Allow informational benchmark warnings (pytest-benchmark plugin)
  "default::pytest_benchmark.logger.PytestBenchmarkWarning",
]

[project]
name = "cuml"
dynamic = ["version"]
description = "cuML - RAPIDS ML Algorithms"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [
    { name = "NVIDIA Corporation" },
]
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "cuda-python>=13.0.1,<14.0",
    "cuda-toolkit[cublas,cufft,curand,cusolver,cusparse]==13.*",
    "cudf==26.6.*,>=0.0.0a0",
    "cupy-cuda13x>=13.6.0",
    "joblib>=0.11",
    "libcuml==26.6.*,>=0.0.0a0",
    "numba-cuda>=0.22.2,<0.29.0",
    "numba>=0.60.0,<0.65.0",
    "numpy>=1.23,<3.0",
    "nvidia-nvjitlink>=13.0,<14",
    "packaging",
    "pylibraft==26.6.*,>=0.0.0a0",
    "rich",
    "rmm==26.6.*,>=0.0.0a0",
    "scikit-learn>=1.5",
    "scipy>=1.14.0",
    "treelite>=4.7.0,<5.0.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
test = [
    "certifi",
    "cython>=3.2.2",
    "hdbscan>=0.8.39,<0.8.40",
    "hypothesis>=6.0,<7",
    "ipython>=7.32.0",
    "nltk",
    "numpydoc<1.9",
    "nvidia-ml-py>=12",
    "pynndescent",
    "pytest",
    "pytest-benchmark",
    "pytest-cases",
    "pytest-cov",
    "pytest-xdist",
    "pyyaml",
    "scikit-learn>=1.5",
    "seaborn",
    "statsmodels",
    "umap-learn>=0.5.7,<0.5.12",
    "xgboost>=2.1.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
dask = [
    "dask-cudf==26.6.*,>=0.0.0a0",
    "raft-dask==26.6.*,>=0.0.0a0",
    "rapids-dask-dependency==26.6.*,>=0.0.0a0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
test-dask = [
    "dask-cuda==26.6.*,>=0.0.0a0",
    "dask-ml>=2024",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.urls]
Homepage = "https://github.com/rapidsai/cuml"
Documentation = "https://docs.rapids.ai/api/cuml/stable/"

[project.entry-points.rapids_doctor_check]
cuml_import = "cuml.health_checks:import_check"
cuml_functional = "cuml.health_checks:functional_check"
cuml_accel_basic = "cuml.health_checks:accel_basic_check"
cuml_accel_cli = "cuml.health_checks:accel_cli_check"

[tool.black]
line-length = 79
target-version = ["py311"]
include = '\.py?$'
force-exclude = '''
_stop_words\.py |
_version\.py |
versioneer\.py |
/(
    \.eggs |
    \.git |
    \.hg |
    \.mypy_cache |
    \.tox |
    \.venv |
    _build |
    _thirdparty |
    buck-out |
    build |
    dist |
    thirdparty
)/
'''

[tool.isort]
profile = "black"
line_length = 79

[tool.rapids-build-backend]
build-backend = "scikit_build_core.build"
dependencies-file = "../../dependencies.yaml"
matrix-entry = "cuda_suffixed=true;use_cuda_wheels=true"
requires = [
    "cmake>=3.30.4",
    "cuda-python>=13.0.1,<14.0",
    "cython>=3.2.2",
    "libcuml==26.6.*,>=0.0.0a0",
    "libraft==26.6.*,>=0.0.0a0",
    "librmm==26.6.*,>=0.0.0a0",
    "ninja",
    "pylibraft==26.6.*,>=0.0.0a0",
    "rmm==26.6.*,>=0.0.0a0",
    "treelite>=4.7.0,<5.0.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.scikit-build]
build-dir = "build/{wheel_tag}"
cmake.build-type = "Release"
cmake.version = "CMakeLists.txt"
minimum-version = "build-system.requires"
ninja.make-fallback = false
sdist.exclude = ["*tests*"]
sdist.reproducible = true
wheel.packages = ["cuml"]
wheel.py-api = "cp311" # overridden in CI builds by arguments from `ci/build_wheel_*.sh` scripts.

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.regex"
input = "cuml/VERSION"
regex = "(?P<value>.*)"
