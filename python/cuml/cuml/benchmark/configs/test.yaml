version: 1

suite:
  name: test
  tier: test
  description: Tiny harness-validation benchmark manifest

profiles:
  default:
    include_tags: [test]

defaults:
  input_type: numpy
  dtype: fp32
  n_reps: 1
  random_state: 42
  test_split: 0.1
  backends: [cpu, gpu]
  raise_on_error: true
  enabled: true
  tags: [test]

benchmarks:
  - id: test_logreg_fit
    algorithm: LogisticRegression
    dataset: classification
    operation: fit
    rows: [200]
    features: [8]
    tags: [test, linear, classification]

  - id: test_scaler_fittransform
    algorithm: StandardScaler
    dataset: classification
    operation: fit_transform
    rows: [200]
    features: [8]
    tags: [test, preprocessing]
