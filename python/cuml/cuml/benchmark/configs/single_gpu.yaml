    algorithm: LogisticRegression
    dataset: classification
    operation: fit
    tags: [linear, classification]
    variants:
      narrow:
        features: [16]
        tiers:
          default: {rows: [84000000]}
          nightly: {rows: [168000000]}
      medium:
        features: [128]
        tiers:
          default: {rows: [10500000]}
          nightly: {rows: [42000000]}
      wide:
        features: [512]
        tiers:
          default: {rows: [2600000]}
          nightly: {rows: [10400000]}

