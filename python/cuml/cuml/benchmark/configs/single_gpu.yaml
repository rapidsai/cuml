version: 1

suite:
  name: single_gpu
  tier: single_gpu
  description: Canonical single-GPU regression manifest

profiles:
  default:
    include_tags: [default-profile]
  extended:
    include_tags: [default-profile, extended-profile]
  nightly:
    include_tags: [default-profile, extended-profile, nightly-only]
  all:
    include_tags: [default-profile, extended-profile, nightly-only]

defaults:
  input_type: cupy
  dtype: fp32
  n_reps: 3
  random_state: 42
  test_split: 0.1
  run_cpu: true
  run_gpu: true
  raise_on_error: true
  enabled: true
  tags: [single-gpu]
  comparison:
    mode: relative_regression
    tolerance_pct: 15

benchmarks:
