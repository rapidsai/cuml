version: 1

suite:
  name: single_gpu
  tier: single_gpu
  description: Canonical single-GPU regression manifest

profiles:
  default:
    include_tags: [default]
  nightly:
    include_tags: [nightly]
  all:
    include_tags: [default, nightly]

defaults:
  input_type: cupy
  dtype: fp32
  n_reps: 3
  random_state: 42
  test_split: 0.1
  backends: [cpu, gpu]
  raise_on_error: true
  enabled: true
  tags: [single-gpu]
  comparison:
    mode: relative_regression
    tolerance_pct: 15

benchmarks:
